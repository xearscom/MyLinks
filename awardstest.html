<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">    
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>.xearsweb.кяру</title>
    <link rel="icon" href="icon.png" type="image/png"> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            font-family: "Pixelify Sans", sans-serif;
            height: 100%;
            margin: 0;
            color: #a1a1a1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #ffffff;
        }

        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        /* Оверлей для читаемости контента — светлый */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            z-index: -1;
        }

        .head {
            margin-left: 15px;
            margin-top: 15px;
            font-size: 22px;
            z-index: 1;
        }

        /* Основной контент — галерея */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 1;
        }

        /* Контейнер галереи — светлый */
        .gallery-container {
            max-width: 1600px;
            width: 100%;
            background-color: rgba(237, 237, 237, 0.9);
            backdrop-filter: blur(3px);
            border-radius: 8px;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Заголовок — светлый */
        .section-title {
            text-align: left;
            margin-bottom: 1.8rem;
            font-family: 'Pixelify Sans', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #a8a8a8;
            text-transform: uppercase;
        }

        /* Ряд: flex без переноса, равномерное распределение */
        .gallery-row {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 1.2rem;
            justify-content: center;
            align-items: stretch;
            width: 100%;
        }

        /* Каждая карточка — светлая */
        .art-card {
            flex: 1 1 0;
            min-width: 0;
            background: #e6e6e6;
            border-radius: 6px;
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .art-card:hover {
            transform: translateY(-5px);
        }

        .image-wrapper {
            width: 100%;
            background: #ffffff;
            border-radius: 6px 6px 0 0;
            overflow: hidden;
        }

        .art-image {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            transition: opacity 0.2s;
        }

        .card-text {
            padding: 1rem 0.8rem 1rem 0.8rem;
            text-align: left;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .art-title {
            font-size: 1.35rem;
            font-weight: 700;
            font-family: 'Pixelify Sans', monospace;
            line-height: 1.3;
            letter-spacing: -0.01em;
            color: #606060;
            margin-bottom: 0.5rem;
            word-break: break-word;
            display: block;
        }

        .author-wrapper {
            margin-top: auto;
            padding-top: 0.6rem;
            border-top: 1px solid #dbdbdb;
        }

        .art-author {
            font-size: 0.78rem;
            font-weight: 500;
            font-family: 'Pixelify Sans', monospace;
            color: #626262;
            letter-spacing: 0.02em;
            display: block;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .footer-links {
            margin-left: 15px;
            margin-bottom: 15px;
            margin-top: 15px;
            font-size: 18px;
            z-index: 1;
        }

        p {
            text-align: left;
            font-size: 16px;
        }

        a {
            color: #a1a1a1;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Адаптивность */
        @media (max-width: 1100px) {
            .gallery-container {
                padding: 1.2rem;
            }
            .section-title {
                font-size: 1.5rem;
                margin-bottom: 1.4rem;
            }
            .art-title {
                font-size: 1.1rem;
            }
            .art-author {
                font-size: 0.68rem;
            }
            .gallery-row {
                gap: 0.8rem;
            }
        }

        @media (max-width: 860px) {
            .section-title {
                font-size: 1.3rem;
                margin-bottom: 1.2rem;
            }
            .art-title {
                font-size: 0.95rem;
            }
            .art-author {
                font-size: 0.6rem;
            }
            .card-text {
                padding: 0.7rem 0.5rem;
            }
        }

        @media (max-width: 700px) {
            .section-title {
                font-size: 1.1rem;
                margin-bottom: 1rem;
            }
            .art-title {
                font-size: 0.8rem;
            }
            .art-author {
                font-size: 0.55rem;
            }
            .gallery-row {
                gap: 0.5rem;
            }
        }

        @media (max-width: 560px) {
            .section-title {
                font-size: 0.95rem;
                margin-bottom: 0.8rem;
            }
            .art-title {
                font-size: 0.7rem;
            }
            .art-author {
                font-size: 0.5rem;
            }
            .gallery-container {
                padding: 0.8rem;
            }
        }
    </style>
</head>
